<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Copa Tapia — El Torneo de Claudio Tapia | Juego de fútbol argentino</title>
<meta name="description" content="Copa Tapia: armá tu equipo con un draft al azar de planteles históricos del fútbol argentino, elegí formación y DT, y ganá la copa. Gratis y online.">
<meta name="keywords" content="copa tapia, claudio tapia, chiqui tapia, juego futbol argentino, draft, torneo">
<meta property="og:title" content="Copa Tapia — El Torneo de Claudio Tapia">
<meta property="og:description" content="Draft al azar de equipos históricos del fútbol argentino. Armá tu equipo y ganá la copa.">
<meta property="og:type" content="website">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1A1A1A; --cream:#F0EBE0; --terra:#C75B2E; --paper:#F7F3EA;
  --line:#1A1A1A; --muted:#7a7062; --gold:#b8902f;
  --green:#2f6b3a;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  background:var(--cream); color:var(--ink);
  font-family:"Spectral",Georgia,serif;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 18% 12%, rgba(199,91,46,.05), transparent 40%),
    radial-gradient(circle at 82% 78%, rgba(26,26,26,.05), transparent 42%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.035'/></svg>");
}
#app{max-width:720px; margin:0 auto; min-height:100%; padding:0 0 40px}
.mono{font-family:"Space Mono",monospace}
.disp{font-family:"Oswald",sans-serif; text-transform:uppercase; letter-spacing:.02em}
.screen{padding:22px 18px; animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}

/* header bar */
.topbar{display:flex; align-items:center; justify-content:space-between;
  border-bottom:3px double var(--ink); padding:10px 18px 8px; position:sticky; top:0; z-index:30;
  background:var(--cream)}
.topbar .brand{font-family:"Oswald"; font-weight:700; text-transform:uppercase; letter-spacing:.06em; font-size:15px; display:flex; align-items:center}
.topbar .brand .brandlogo{height:30px; width:auto; display:block}
body.night .topbar .brand .brandlogo{filter:brightness(0) invert(1)}
.topbar .brand b{color:var(--terra)}
.topbar .step{font-family:"Space Mono"; font-size:11px; color:var(--muted)}

/* intro */
.cover{text-align:center; padding:30px 16px 10px}
.kicker{font-family:"Space Mono"; font-size:11px; letter-spacing:.35em; text-transform:uppercase; color:var(--terra)}
.cover h1{font-family:"Oswald"; font-weight:700; text-transform:uppercase; line-height:.92;
  font-size:clamp(46px,15vw,86px); letter-spacing:-.01em; margin:6px 0}
.cover h1 .l2{display:block; color:var(--terra)}
.byline{font-style:italic; color:var(--muted); margin-top:4px}
.rule{height:0; border-top:1px solid var(--ink); margin:18px 0; opacity:.4}
.howto{border:1px solid var(--ink); background:var(--paper); padding:16px; margin:14px 0;
  box-shadow:5px 5px 0 var(--ink)}
.howto h3{font-family:"Oswald"; text-transform:uppercase; letter-spacing:.05em; font-size:14px; margin-bottom:8px}
.howto ol{margin-left:18px; font-size:14.5px; line-height:1.55}
.howto li{margin:5px 0}
.howto b{color:var(--terra)}

/* buttons */
.btn{font-family:"Oswald"; text-transform:uppercase; letter-spacing:.08em; font-weight:600;
  background:var(--ink); color:var(--cream); border:none; padding:15px 22px; font-size:16px;
  cursor:pointer; width:100%; box-shadow:5px 5px 0 var(--terra); transition:transform .08s, box-shadow .08s}
.btn:active{transform:translate(3px,3px); box-shadow:2px 2px 0 var(--terra)}
.btn.alt{background:var(--terra); box-shadow:5px 5px 0 var(--ink)}
.btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--ink); box-shadow:none; font-size:13px; padding:10px}
.btn:disabled{opacity:.4; cursor:not-allowed; box-shadow:none}

/* shield */
.shield{width:34px;height:38px;flex:none;border-radius:4px 4px 16px 16px/4px 4px 22px 22px;
  border:2px solid var(--ink); display:flex;align-items:center;justify-content:center;
  font-family:"Oswald";font-weight:700;font-size:14px; position:relative; overflow:hidden}
.shield .st{position:absolute; inset:0; }

/* draft */
.section-title{font-family:"Oswald"; text-transform:uppercase; letter-spacing:.06em; font-size:13px; color:var(--muted); margin:26px 0 12px}
.teamcard{border:2px solid var(--ink); background:var(--paper); padding:14px; box-shadow:6px 6px 0 var(--ink); margin-bottom:14px}
.teamcard .hd{display:flex; gap:12px; align-items:center}
.teamcard .nm{font-family:"Oswald"; text-transform:uppercase; font-weight:700; font-size:22px; line-height:1}
.teamcard .yr{font-family:"Space Mono"; color:var(--terra); font-size:13px}
.teamcard .tg{font-size:13px; color:var(--muted); font-style:italic}
.teamcard .pf{font-size:13.5px; margin-top:8px; line-height:1.45; border-top:1px dashed var(--ink); padding-top:8px}
.chips{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
.chip{font-family:"Space Mono"; font-size:10.5px; border:1px solid var(--ink); padding:3px 7px; text-transform:uppercase; letter-spacing:.04em}
.chip.terra{background:var(--terra); color:#fff; border-color:var(--terra)}

.players{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.pcard{border:1px solid var(--ink); background:var(--cream); padding:9px 10px; cursor:pointer; text-align:left;
  display:flex; align-items:center; justify-content:space-between; gap:8px; transition:transform .07s, background .1s; position:relative}
.pcard:active{transform:scale(.98)}
.pcard.dis{opacity:.32; cursor:not-allowed; filter:grayscale(.4)}
.pcard.sel{background:var(--ink); color:var(--cream)}
.pcard .pos{font-family:"Space Mono"; font-size:9.5px; letter-spacing:.05em; opacity:.7; text-transform:uppercase}
.pcard .pn{font-family:"Spectral"; font-weight:600; font-size:14px; line-height:1.05}
.pcard .rt{font-family:"Oswald"; font-weight:700; font-size:20px}
.pcard .rt.s{color:var(--terra)}
.pcard.sel .rt.s{color:#ffb38a}

/* pitch */
.pitch{position:relative; width:100%; max-width:320px; margin:0 auto; aspect-ratio:7/9; background:
  radial-gradient(ellipse at 50% 42%, rgba(255,255,255,.06), rgba(0,0,0,.10) 75%),
  repeating-linear-gradient(0deg,#3f8a4e 0 8.5%, #368044 8.5% 17%);
  border:2px solid var(--ink); border-radius:10px; overflow:hidden; box-shadow:5px 5px 0 var(--ink)}
.pitch .ln{position:absolute; background:rgba(255,255,255,.5)}
.slot{position:absolute; transform:translate(-50%,-50%); width:68px; text-align:center; cursor:pointer}
.slot .dot{position:relative; width:40px;height:40px;border-radius:50%; margin:0 auto; border:2px solid #fff;
  display:flex;align-items:center;justify-content:center; font-family:"Oswald"; font-weight:700; font-size:15px;
  background:rgba(26,26,26,.55); color:#fff; box-shadow:0 2px 6px rgba(0,0,0,.35); transition:transform .12s}
.slot.filled .dot{box-shadow:0 0 0 3px rgba(255,255,255,.16), 0 0 16px 3px var(--glow,rgba(0,0,0,.4)), 0 2px 7px rgba(0,0,0,.45)}
.slot.filled:active .dot{transform:scale(1.07)}
.slot.crack .dot{border-color:#ffd24d; box-shadow:0 0 0 3px rgba(255,210,77,.4), 0 0 20px 4px rgba(255,210,77,.7), 0 2px 7px rgba(0,0,0,.45)}
.slot.crack .dot::after{content:"\2605"; position:absolute; top:-11px; right:-3px; font-size:11px; line-height:1; color:#ffd24d; text-shadow:0 1px 2px #000}
.slot.empty .dot{background:rgba(255,255,255,.18); border-style:dashed}
.slot.cand .dot{background:#2E7D4F; border-color:#fff; animation:pulse 1s infinite}
.slot.cand .dot.pen{background:var(--terra)}
.slot .dot.pen{box-shadow:inset 0 0 0 2px var(--terra)}
.slot .dot sup{font-size:7px;font-weight:700;margin-left:1px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.6)}50%{box-shadow:0 0 0 6px rgba(255,255,255,0)}}
.slot .lbl{font-family:"Space Mono"; font-size:8px; color:#fff; margin-top:2px; line-height:1; text-shadow:0 1px 2px #000}
.slot .nm{font-family:"Spectral"; font-weight:600; font-size:9.5px; color:#fff; line-height:1.05; text-shadow:0 1px 2px #000; margin-top:1px}
/* ===== cancha del partido (ambos equipos) ===== */
.matchwrap{display:flex; flex-direction:column; gap:12px}
.matchpitch{position:sticky; top:54px; z-index:5}
.field{position:relative; width:100%; aspect-ratio:8/5; border:2px solid var(--ink); border-radius:10px; overflow:hidden;
  background:
   radial-gradient(ellipse at 50% 50%, rgba(255,255,255,.05), rgba(0,0,0,.13) 80%),
   repeating-linear-gradient(90deg,#3f8a4e 0 7%, #368044 7% 14%);
  box-shadow:4px 4px 0 var(--ink)}
.field .fl{position:absolute; background:rgba(255,255,255,.45)}
.mslot{position:absolute; transform:translate(-50%,-50%); width:54px; text-align:center; z-index:1}
.mdot{position:relative; width:19px;height:19px;border-radius:50%; margin:0 auto; border:1.5px solid #fff;
  display:flex;align-items:center;justify-content:center; font-family:"Oswald";font-weight:700;font-size:8px;color:#fff;
  background:var(--c,rgba(26,26,26,.7)); box-shadow:0 0 0 2px rgba(255,255,255,.12), 0 1px 3px rgba(0,0,0,.5); transition:all .18s}
.mname{font-family:"Space Mono"; font-size:7px; color:#fff; line-height:1; margin-top:2px; text-shadow:0 1px 3px #000, 0 0 2px #000;
  white-space:nowrap; overflow:visible}
.mslot.lit{z-index:3}
.mslot.lit .mdot{border-color:#ffe14d; transform:scale(1.5);
  box-shadow:0 0 0 3px rgba(255,225,77,.55), 0 0 16px 5px rgba(255,225,77,.95); animation:litpulse .7s infinite}
.mslot.lit .mname{color:#ffe14d; font-weight:700}
@keyframes litpulse{0%,100%{box-shadow:0 0 0 3px rgba(255,225,77,.55),0 0 14px 4px rgba(255,225,77,.85)}50%{box-shadow:0 0 0 4px rgba(255,225,77,.3),0 0 24px 9px rgba(255,225,77,1)}}
@media(min-width:760px){
  .matchwrap{flex-direction:row; align-items:flex-start}
  .matchpitch{flex:0 0 330px; position:sticky; top:62px}
  .matchwrap .feed{flex:1; min-width:0}
}

/* dado / roll */
.rollstage{display:flex;justify-content:center;margin:6px 0 16px}
.rollbox{width:100%;min-height:210px;border:2px solid var(--ink);background:var(--paper);box-shadow:7px 7px 0 var(--ink);
  display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.rollhint{font-size:70px;opacity:.6}
.rollteam{display:flex;flex-direction:column;align-items:center;gap:6px}
.rollteam .rollnm{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:clamp(30px,9vw,48px);line-height:.9;margin-top:4px}
.rollteam .rollyr{color:var(--terra);font-size:14px;letter-spacing:.05em}
.rollteam .rolltag{font-size:13px;color:var(--muted);font-style:italic;max-width:320px;line-height:1.3}
.rollteam.final{animation:stamp .45s cubic-bezier(.2,1.4,.4,1)}
@keyframes stamp{0%{transform:scale(1.35) rotate(-3deg);opacity:0}60%{transform:scale(.96)}100%{transform:scale(1);opacity:1}}
.teamcard.big{position:relative;box-shadow:7px 7px 0 var(--terra);animation:fade .45s ease}
.teamcard.big .stampchip{position:absolute;top:-10px;right:14px;background:var(--terra);color:#fff;font-size:10px;
  text-transform:uppercase;letter-spacing:.12em;padding:3px 9px;border:1px solid var(--ink);transform:rotate(2deg)}
.teamcard .nm.xl{font-size:28px}
/* instrucciones por jugador */
.ilist{display:flex;flex-direction:column;gap:6px}
.irow{display:flex;align-items:center;gap:8px}
.irow .ipos{flex:0 0 38px;font-size:11px;color:var(--terra);font-weight:700;text-align:center;border:1px solid var(--line);padding:3px 0;background:#fff}
.irow .inm{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.irow .isel{flex:0 0 140px;font-family:inherit;font-size:12.5px;padding:6px 8px;border:1px solid var(--ink);background:#fff;color:var(--ink)}
.irow .ihint{flex:0 0 140px;font-size:11px;color:var(--muted);text-align:center;font-style:italic}
/* formation picker */
.fgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.fcard{border:2px solid var(--ink); background:var(--paper); padding:10px; cursor:pointer; box-shadow:4px 4px 0 var(--ink); transition:transform .08s}
.fcard:active{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink)}
.fcard.act{background:var(--ink); color:var(--cream)}
.fcard .fn{font-family:"Oswald"; font-weight:700; font-size:24px}
.fcard .fd{font-size:12px; color:var(--muted)}
.fcard.act .fd{color:#cbb}
.minip{position:relative; width:100%; aspect-ratio:1/1; background:#3c7a45; border:1px solid var(--ink); margin-top:8px; border-radius:3px}
.minip i{position:absolute; width:7px;height:7px;border-radius:50%; background:#fff; transform:translate(-50%,-50%)}

/* setup */
.box{border:1px solid var(--ink); background:var(--paper); padding:14px; margin-bottom:14px; box-shadow:4px 4px 0 var(--ink)}
.box h3{font-family:"Oswald"; text-transform:uppercase; letter-spacing:.05em; font-size:13px; margin-bottom:10px}
.seg{display:flex; gap:0; border:1px solid var(--ink)}
.seg button{flex:1; background:transparent; border:none; border-right:1px solid var(--ink); padding:10px 6px; cursor:pointer;
  font-family:"Oswald"; text-transform:uppercase; font-size:12px; letter-spacing:.04em}
.seg button:last-child{border-right:none}
.seg button.act{background:var(--terra); color:#fff}
input[type=range]{width:100%; accent-color:var(--terra)}
.rangelabels{display:flex; justify-content:space-between; font-family:"Space Mono"; font-size:10px; color:var(--muted); margin-top:4px}
.dtgrid{display:grid; grid-template-columns:1fr 1fr; gap:6px; max-height:260px; overflow:auto; padding:2px}
.dtopt{border:1px solid var(--ink); padding:8px; cursor:pointer; font-size:12.5px; background:var(--cream)}
.dtopt.act{background:var(--ink); color:var(--cream)}
.dtopt .dst{font-family:"Space Mono"; font-size:9px; color:var(--terra); text-transform:uppercase; letter-spacing:.05em}
.dtopt.act .dst{color:#ffb38a}

/* cup bracket */
.bracket{display:flex; flex-direction:column; gap:10px}
.round{border-left:3px solid var(--terra); padding-left:12px}
.round h4{font-family:"Oswald"; text-transform:uppercase; font-size:12px; letter-spacing:.06em; color:var(--muted)}
.tie{display:flex; align-items:center; gap:10px; border:1px solid var(--ink); background:var(--paper); padding:8px 10px; margin-top:6px}
.tie.win{background:#e9f3ea; border-color:var(--green)}
.tie.lose{background:#f6e7e3; opacity:.7}
.tie .vs{font-family:"Space Mono"; font-size:11px; color:var(--muted)}
.tie .sc{font-family:"Oswald"; font-weight:700; font-size:20px; margin-left:auto}

/* match relato */
.scoreboard{display:flex; align-items:center; justify-content:center; gap:14px; border:2px solid var(--ink);
  background:var(--ink); color:var(--cream); padding:12px; box-shadow:5px 5px 0 var(--terra); margin-bottom:14px}
.scoreboard .tn{font-family:"Oswald"; text-transform:uppercase; font-size:15px; text-align:center; width:38%}
.scoreboard .sc{font-family:"Oswald"; font-weight:700; font-size:34px; min-width:34px; text-align:center}
.minute{font-family:"Space Mono"; font-size:11px; color:var(--muted); text-align:center; margin-bottom:10px}
.feed{display:flex; flex-direction:column; gap:9px; min-height:120px}
.play{border:1px solid var(--ink); background:var(--paper); padding:10px 12px; animation:fade .35s ease}
.play .who{font-family:"Oswald"; text-transform:uppercase; font-weight:600; font-size:13px; letter-spacing:.03em}
.play .who .yr{color:var(--terra); font-family:"Space Mono"; font-size:11px}
.play .txt{font-size:14px; margin-top:3px; line-height:1.4}
.play.goal{background:var(--ink); color:var(--cream); box-shadow:4px 4px 0 var(--terra)}
.play.goal .txt b{color:#ffd9a8}
.susp{font-family:"Oswald"; letter-spacing:.3em; color:var(--terra)}
.analysis{border:1px dashed var(--ink); padding:12px; font-size:14px; line-height:1.5; margin-top:14px; font-style:italic; background:var(--paper)}
/* puntajes post-partido */
.cuphead{display:flex;align-items:center;gap:14px;justify-content:center;margin:4px 0 10px}
.cuphead .cuplogo{height:64px;width:auto;filter:drop-shadow(2px 2px 0 rgba(26,26,26,.15))}
.cuphead .cuptitle{font-family:"Oswald";text-transform:uppercase;font-weight:700;line-height:.95;font-size:24px;color:var(--ink)}
.cuphead .cuptitle span{color:var(--terra)}
.cuphead .chiqui{height:60px;width:60px;border-radius:50%;object-fit:cover;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--terra)}
.topbar{position:relative}
.backbtn{position:absolute;left:10px;top:50%;transform:translateY(-50%);z-index:5;background:var(--cream);color:var(--ink);border:2px solid var(--ink);width:34px;height:34px;font-size:18px;line-height:1;cursor:pointer;box-shadow:2px 2px 0 var(--ink);font-family:"Oswald";font-weight:700}
.backbtn:active{transform:translateY(-50%) translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}
.introface{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid var(--ink);box-shadow:4px 4px 0 var(--terra);margin:0 auto 14px;display:block}
.introhero{width:74%;max-width:300px;aspect-ratio:3/4;object-fit:cover;object-position:50% 25%;border-radius:24px;border:3px solid var(--ink);box-shadow:6px 6px 0 var(--terra);margin:0 auto 16px;display:block}
.rt.hid{color:var(--muted);opacity:.5}
/* leaderboard */
.lbtot{text-align:center;font-size:15px;margin:4px 0 10px}
.lbtot b{font-family:"Oswald";font-size:22px;color:var(--terra)}
.lblist{display:flex;flex-direction:column;gap:7px}
.lbmsg{font-size:13px;color:var(--muted);font-style:italic;text-align:center;padding:8px}
.lbrow{border:2px solid var(--ink);background:#fff;box-shadow:3px 3px 0 var(--ink);border-radius:14px;overflow:hidden}
.lbrow.me{box-shadow:3px 3px 0 var(--terra)}
.lbrow summary{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;list-style:none}
.lbrow summary::-webkit-details-marker{display:none}
.lbrow .lbpos{font-family:"Oswald";font-weight:700;font-size:16px;min-width:24px;text-align:center}
.lbrow .lbname{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbrow .lbpts{font-family:"Oswald";font-weight:700;font-size:18px;color:var(--terra)}
.lbteam{padding:0 12px 12px;font-size:12px;line-height:1.6;border-top:1px dashed var(--line)}
.lbteam .lbtp{color:var(--terra);font-size:10px;margin-right:2px}
.lbqual{border:2px dashed var(--terra);border-radius:14px;padding:12px;margin-bottom:10px;text-align:center}
.lbqual .lbq{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:15px;margin-bottom:8px}
.lbrowform{display:flex;gap:8px}
.lbrowform input{flex:1;font-family:inherit;font-size:15px;padding:9px;border:2px solid var(--ink);border-radius:12px}
.lbrowform .btn{width:auto;padding:9px 16px;margin:0}
.introbtns{display:flex;flex-direction:column;gap:18px;margin-top:24px}
.introbtns .btn{margin:0}
/* botones portada extra */
.btn.night-btn{background:#0b1020;color:#e8eef7;border-color:#0b1020;box-shadow:4px 4px 0 #C75B2E}
.btn.ghost{background:transparent;color:var(--ink);box-shadow:none;border:2px dashed var(--ink)}
/* comodines */
.wilds{display:flex;gap:10px;margin-bottom:14px}
.wild{flex:1;background:#fff;border:2px solid var(--ink);border-radius:16px;box-shadow:4px 4px 0 var(--ink);padding:12px;text-align:center;cursor:pointer;transition:transform .08s}
.wild:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.wild .we{font-size:26px}
.wild .wn{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:13px;margin-top:3px}
.wild .wd{font-size:11px;color:var(--muted);margin-top:2px}
/* overlay / quiz */
.ov{position:fixed;inset:0;background:rgba(10,12,20,.72);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.ovbox{background:var(--cream);border:3px solid var(--ink);border-radius:20px;box-shadow:8px 8px 0 var(--ink);padding:20px;max-width:460px;width:100%;max-height:84vh;overflow:auto}
.qtitle{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:16px;text-align:center}
.qtitle.ok{color:#2e8b4f}.qtitle.bad{color:#b23a3a}
.qq{font-family:"Spectral";font-size:18px;text-align:center;margin:12px 0 16px}
.qopts{display:flex;flex-direction:column;gap:9px}
.qopt{font-family:inherit;font-size:15px;font-weight:600;padding:13px;border:2px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;transition:transform .08s}
.qopt:active{transform:translate(2px,2px)}
.q90{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.c90{display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;font-family:inherit;font-size:14px;padding:10px 13px;border:2px solid var(--ink);border-radius:13px;background:#fff;cursor:pointer}
.c90 b{font-family:"Oswald";font-size:18px;color:var(--terra)}
.c90:active{transform:translate(2px,2px)}
/* ===== TEMA NOCTURNO (rival del día) ===== */
body.night{background:#0a0e1a;color:#e8eef7}
body.night .topbar{background:#0a0e1a;color:#e8eef7;border-bottom-color:#1b2740}
body.night .topbar .brand,body.night .topbar .step{color:#e8eef7}
body.night .section-title{color:#9fb2d0;border-color:#1b2740}
body.night .teamcard,body.night .box,body.night .plancard,body.night .scout,body.night .grades .grade,body.night .penwrap,body.night .pcard,body.night .dtcard,body.night .vroll,body.night .ovbox{
  background:#0e0e12;color:#e8eef7;border-color:#000;box-shadow:5px 5px 0 #000}
body.night .plancard.act{border-color:#C75B2E;box-shadow:5px 5px 0 #C75B2E}
body.night .muted,body.night .pdesc,body.night .vs,body.night .foot,body.night .srep,body.night .mono{color:#8aa0c2}
body.night .pname,body.night .snm,body.night .gl{color:#e8eef7}
body.night .gn{color:#fff}
body.night .minute{color:#9fb2d0}
body.night .feed .play{background:#0e0e12;border-color:#000;color:#e8eef7;box-shadow:3px 3px 0 #000}
body.night .feed .play.goal{border-color:#C75B2E}
body.night .scoreboard{background:#0e0e12;border-color:#000;color:#e8eef7;box-shadow:5px 5px 0 #000}
body.night .qtitle{color:#e8eef7}body.night .qopt,body.night .c90,body.night .wild{background:#15151c;color:#e8eef7;border-color:#000}
body.night .fcard{background:#0e0e12;color:#e8eef7;border-color:#000;box-shadow:4px 4px 0 #000}
body.night .fcard .fn{color:#e8eef7}
body.night .fcard .fd{color:#8aa0c2}
body.night .fcard.act{background:#C75B2E;color:#fff;border-color:#000}
body.night .fcard.act .fn,body.night .fcard.act .fd{color:#fff}
body.night .aggr-track{background:#1b2740}
/* cancha iluminada */
body.night .pitch{background:
  radial-gradient(ellipse at 50% 38%, rgba(120,255,150,.22), rgba(0,0,0,0) 60%),
  repeating-linear-gradient(0deg,#1f6b34 0 9%, #1a5e2d 9% 18%);
  border-color:#000; box-shadow:0 0 28px rgba(120,255,160,.25), 5px 5px 0 #000}
body.night .pitch .ln{background:rgba(255,255,255,.7); box-shadow:0 0 6px rgba(255,255,255,.5)}
body.night .slot .dot{box-shadow:0 0 10px rgba(150,255,180,.5)}
/* ===== DESAFÍO DEL DÍA · TODO ILUMINADO ===== */
/* FIX contraste: NO redefinir --ink/--muted (rompia fondos claros: boton, input). Reglas dirigidas: */
/* cajas CLARAS en noche (dado, animacion de equipos, equipo sorteado) => texto OSCURO */
body.night .rollbox, body.night .rollbox *{ color:#1A1A1A !important; text-shadow:none !important }
body.night .rollbox .thyr{ color:#C75B2E !important }
body.night .rollbox .rollhint{ opacity:1; filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)) }
/* flecha volver: caja crema => icono oscuro */
body.night .backbtn{ background:var(--cream); color:#1A1A1A }
/* botones ghost y deshabilitados legibles sobre fondo oscuro */
body.night .btn.ghost{ color:#e8eef7; border-color:#3a4a66 }
body.night .btn:disabled{ opacity:.6 }
/* nombres de jugadores del draft: caja oscura => blanco fuerte (camisetas/avatares intactos) */
body.night .players .pcard .pn{ color:#ffffff }
body.night .players .pcard .pos{ color:#aab4c4 }
body.night .players .pcard .pnum{ color:#8fa0bb }
/* marcador y nombres de equipo con luz */
body.night .scoreboard .tn{ color:#fff; text-shadow:0 0 12px rgba(120,255,170,.5), 0 0 4px rgba(255,255,255,.55) }
body.night .sc{ color:#eafff2; text-shadow:0 0 16px rgba(120,255,170,.65), 0 0 6px rgba(255,255,255,.6) }
body.night .minute{ color:#cfe0ff; text-shadow:0 0 9px rgba(120,200,255,.55) }
/* nombres, títulos, opciones */
body.night .snm,body.night .pname,body.night .fcard .fn,body.night .qtitle,body.night .qopt,body.night .c90,body.night .gn~*,body.night .qq{
  color:#eef4ff; text-shadow:0 0 6px rgba(150,195,255,.35) }
body.night .qq b,body.night .srep b{ color:#ffd9a8; text-shadow:0 0 10px rgba(199,91,46,.65) }
/* puntajes / notas */
body.night .gn{ color:#ffd9a8; text-shadow:0 0 18px rgba(199,91,46,.7), 0 0 6px rgba(255,205,150,.55) }
body.night .gl,body.night .gq{ color:#cfe0ff }
/* textos secundarios legibles */
body.night .srep,body.night .vs,body.night .pdesc,body.night .foot,body.night .mono,body.night .muted{ color:#aebfde }
/* barras de energía/posesión y feed */
body.night .enlbl,body.night .enpct,body.night #enword,body.night .livebar,body.night .feed .play,body.night .box,body.night .ovbox,body.night .grade,body.night .scout,body.night .dtcard,body.night .pcard{ color:#e8eef7 }
/* el marcador, un poco más "encendido" */
body.night .scoreboard{ box-shadow:0 0 26px rgba(120,255,170,.18), 5px 5px 0 #000 }
/* card activa naranja: sin glow azul para que no choque */
body.night .fcard.act .fn,body.night .fcard.act .fd{ text-shadow:none }
/* redondeo general (más estético) */
.btn,.box,.teamcard,.fcard,.plancard,.scout,.grades .grade,.penwrap,.rollbox,.pcard,.cuphead .cuplogo,.tie,.howto,.cover,input[type=text],.isel{border-radius:18px}
.btn{border-radius:30px}
.chip{border-radius:20px}
.seg button{border-radius:14px}
.backbtn{border-radius:50%}
.minip{border-radius:14px}
.pdot{border-radius:7px}
.stampchip{border-radius:12px}
.pcard{border-radius:16px}
.plancards{display:flex;gap:8px}
.plancard{flex:1;border:2px solid var(--ink);background:#fff;box-shadow:3px 3px 0 var(--ink);padding:12px 6px;text-align:center;cursor:pointer;transition:transform .08s}
.plancard:active{transform:translate(1px,1px)}
.plancard.act{background:var(--terra);color:#fff}
.plancard .pemoji{font-size:30px;line-height:1}
.plancard .pname{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:13px;margin-top:4px}
.plancard .pdesc{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.2}
.plancard.act .pdesc{color:#f3d9cc}
.scout{display:flex;align-items:center;gap:12px;border:2px solid var(--ink);background:var(--paper);box-shadow:4px 4px 0 var(--ink);padding:12px}
.scout .snm{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:16px}
.scout .srep{font-size:13px;line-height:1.4;margin-top:2px}


.grades{display:flex;gap:10px;margin-top:14px}
.grades .grade{flex:1;border:2px solid var(--ink);background:#fff;box-shadow:4px 4px 0 var(--ink);text-align:center;padding:10px 6px}
.grades .gl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.grades .gn{font-family:"Oswald";font-weight:700;font-size:40px;line-height:1;color:var(--terra)}
.grades .gq{font-size:12px;font-style:italic}
/* tanda de penales */
.penwrap{border:2px solid var(--ink);background:var(--paper);box-shadow:6px 6px 0 var(--terra);padding:16px;margin-top:14px;text-align:center}
.pentitle{font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:18px}
.penteams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:8px 0;font-family:"Oswald";text-transform:uppercase;font-size:13px}
.penteams .penscore{font-size:30px}
.penteams .penscore b{color:var(--terra)}
.penrow{display:flex;gap:5px;justify-content:center;min-height:24px;margin:3px 0;flex-wrap:wrap}
.pdot{width:22px;height:22px;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:11px;background:#fff}
.pdot.in{background:#2E7D4F;color:#fff;border-color:#2E7D4F}
.pdot.out{background:#fff;color:var(--terra);border-color:var(--terra)}
.penbig{min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:8px;border-top:1px solid var(--line);padding-top:10px}
.penbig .pteam{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.penbig .pkick{font-family:"Oswald";font-weight:700;font-size:clamp(20px,6vw,28px);line-height:1}
.penbig .pwait{font-style:italic;color:var(--muted);font-size:13px}
.penbig .pres{font-family:"Oswald";font-weight:700;font-size:clamp(34px,11vw,56px);line-height:1;margin-top:4px}
.penbig.goal .pres{color:#2E7D4F;animation:stamp .4s ease}
.penbig.miss .pres{color:var(--terra);animation:stamp .4s ease}

/* champion */
.champ{text-align:center; padding:18px 6px}
.champ .crown{font-size:46px}
.champ h1{font-family:"Oswald"; text-transform:uppercase; font-size:clamp(34px,11vw,60px); line-height:.95; color:var(--terra)}
.stamp{display:inline-block; border:3px solid var(--terra); color:var(--terra); font-family:"Oswald"; text-transform:uppercase;
  letter-spacing:.1em; padding:6px 14px; transform:rotate(-5deg); font-weight:700; margin:10px 0}
.xilist{border:1px solid var(--ink); background:var(--paper); margin-top:14px}
.xilist .row{display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid #d8d0c2; font-size:14px; text-align:left}
.xilist .row:last-child{border-bottom:none}
.xilist .pos{font-family:"Space Mono"; font-size:10px; width:34px; color:var(--muted)}
.xilist .rt{margin-left:auto; font-family:"Oswald"; font-weight:700}
.foot{font-family:"Space Mono"; font-size:10px; color:var(--muted); text-align:center; margin-top:24px; letter-spacing:.05em}
.toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--ink); color:var(--cream);
  padding:10px 16px; font-family:"Oswald"; text-transform:uppercase; font-size:12px; letter-spacing:.05em; z-index:60; box-shadow:4px 4px 0 var(--terra); animation:fade .3s}
/* ===== Banco de suplentes ===== */
.benchrow{display:flex;gap:8px}
.benchslot{flex:1;border:2px dashed var(--ink);background:var(--cream);min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:6px;text-align:center}
.benchslot.full{border-style:solid;background:var(--paper);box-shadow:3px 3px 0 var(--ink)}
.benchslot .bplus{font-size:26px;color:var(--terra);line-height:1}
.benchslot .bn{font-weight:700;font-size:13px}
.benchslot .bp{font-size:10px;color:var(--muted);margin-top:3px}
.pcard .skchip{display:inline-flex;align-items:center;gap:4px;margin-top:3px;font-size:10.5px;font-weight:700;color:#993C1D;background:rgba(199,91,46,.14);border:1px solid rgba(199,91,46,.4);padding:1px 7px;border-radius:999px;width:fit-content}
.pcard .skchip.risk{color:#A32D2D;background:rgba(224,65,62,.14);border-color:rgba(224,65,62,.45)}
body.night .pcard .skchip{color:#E8915F}
body.night .pcard .skchip.risk{color:#F0918F}
/* ===== Barra de energía / controles en vivo ===== */
.livebar{border:2px solid var(--ink);background:var(--paper);padding:10px;margin-bottom:12px;box-shadow:4px 4px 0 var(--ink)}
.enwrap{border-left:5px solid #2e9e4f;padding-left:8px}
.enlbl{font-family:"Space Mono";font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:flex;justify-content:space-between;color:#1f7a37;font-weight:700}
.entrack{height:12px;background:#0001;border:1px solid var(--ink);overflow:hidden}
.enfill{height:100%;background:#2e9e4f;transition:width .5s,background .5s}
.livectl{margin-top:10px;border-left:5px solid var(--terra);padding-left:8px}
.aglbl{font-size:12px;margin-bottom:4px;color:#9c4a1f;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.livectl input[type=range]{width:100%;accent-color:var(--terra)}
.subbtn{margin-top:10px;font-size:13px;width:100%;background:#1E5BB8;color:#fff;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);font-weight:700}
.subbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.tacrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px}
.taclbl{width:100%;font-family:"Space Mono";font-size:11px;color:#9c4a1f;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.tacbtn{flex:1;min-width:90px;border:2px solid var(--ink);background:var(--cream);color:var(--ink);font-weight:700;font-size:12px;padding:8px 6px;border-radius:14px;cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .08s}
.tacbtn:active{transform:translate(2px,2px);box-shadow:none}
.tacbtn.act{background:var(--terra);color:#fff;border-color:var(--ink)}
body.night .tacbtn{background:#15151c;color:#eef4ff;border-color:#000;box-shadow:2px 2px 0 #000}
body.night .tacbtn.act{background:#C75B2E;color:#fff}
body.night .taclbl{color:#cfe0ff}
/* ===== Cartel grande de fichaje ===== */
.bigcard{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:80;pointer-events:none;opacity:0;transition:opacity .25s;padding:20px}
.bigcard.on{opacity:1}
.bc-in{background:var(--ink);color:var(--cream);border:3px solid var(--terra);box-shadow:8px 8px 0 var(--terra);padding:22px 26px;max-width:90%;text-align:center;transform:scale(.85);transition:transform .3s}
.bigcard.on .bc-in{transform:scale(1)}
.bc-q{font-family:"Oswald";font-size:20px;font-weight:600;line-height:1.25;font-style:italic}
.bc-n{margin-top:10px;font-size:12px;color:var(--terra);font-weight:700;text-transform:uppercase;letter-spacing:1px}
/* ===== Penal / mano a mano (palos) ===== */
.palos{display:flex;gap:8px;margin-top:10px}
.palo{flex:1;border:2px solid var(--ink);background:var(--cream);padding:12px 4px;cursor:pointer;font-weight:700;font-size:13px;text-align:center;box-shadow:3px 3px 0 var(--terra)}
.palo:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--terra)}
.paloe{font-size:24px;margin-bottom:4px}
/* ===== Juice gol ===== */
.goalflash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:"Oswald";font-weight:700;font-size:13vw;color:#fff;letter-spacing:.05em;opacity:0;pointer-events:none;z-index:90;transform:scale(.6)}
.goalflash.on{animation:goalpop .9s ease-out}
@keyframes goalpop{0%{opacity:0;transform:scale(.4)}25%{opacity:1;transform:scale(1.05)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
/* ===== Relato Tapia / chismes ===== */
.narr{border-left:3px solid var(--terra);background:#c75b2e0d;padding:7px 10px;margin-bottom:8px;font-size:12.5px;font-style:italic;color:var(--ink);opacity:.9}
/* ===== Legibilidad del partido ===== */
.play .txt{font-size:13.5px;line-height:1.35}
.play.goal{border-left:5px solid #2e9e4f;background:#2e9e4f12}
.goalflash{font-size:11vw}
/* ===== Avatares ===== */
.av{display:inline-block;vertical-align:middle;flex:none;border-radius:50%}
.scjersey{display:flex;flex-direction:column;align-items:center;gap:2px}
/* ===== Cinemática de cambio (cuarto árbitro) ===== */
.subcine{position:fixed;inset:0;z-index:85;display:flex;align-items:center;justify-content:center;background:rgba(15,15,15,.55);opacity:0;transition:opacity .25s}

/* ===== INTRO OVERLAY ===== */
#introOverlay{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:opacity .5s ease}
#introOverlay.gone{opacity:0;pointer-events:none}
#introVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#introPlay{position:relative;z-index:2;opacity:0;pointer-events:none;transition:opacity .6s ease;
  background:rgba(0,0,0,.35);color:#fff;border:2px solid rgba(255,255,255,.85);
  font-family:"Oswald",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  font-size:clamp(18px,5vw,30px);padding:16px 46px;cursor:pointer;border-radius:50px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:0 0 40px rgba(0,0,0,.6)}
#introPlay.show{opacity:1;pointer-events:auto;animation:introPulse 1.8s ease-in-out infinite}
#introPlay:hover{background:rgba(199,91,46,.85);border-color:#fff}
@keyframes introPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#introSkip{position:absolute;top:14px;right:16px;z-index:3;color:rgba(255,255,255,.7);
  font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.05em;cursor:pointer;
  background:rgba(0,0,0,.3);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.25)}
#introSkip:hover{color:#fff;background:rgba(0,0,0,.55)}
.subcine.on{opacity:1}
.sc-board{background:#0c0c0c;border:3px solid #ffd23f;border-radius:10px;padding:18px 24px;min-width:230px;text-align:center;box-shadow:0 12px 44px #000;transform:translateY(12px) scale(.95);transition:transform .3s}
.subcine.on .sc-board{transform:none}
.sc-fed{width:46px;height:46px;border-radius:50%;margin:0 auto 8px;background:radial-gradient(circle at 50% 35%,#5aa0ff,#0a2a66);border:2px solid #ffd23f;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;letter-spacing:1px}
.sc-t{color:#ffd23f;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.sc-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:700;margin:4px 0;color:#fff}
.sc-in{color:#37e06a}.sc-out{color:#ff5d52}
.sc-ar{font-size:15px}
/* ===== Cinemática de gol ===== */
.goalcine{position:fixed;inset:0;z-index:88;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,26,12,.5);opacity:0;transition:opacity .2s;pointer-events:none}
.goalcine.on{opacity:1}
.gc-kind{color:#fff;font-family:"Oswald";font-size:20px;letter-spacing:1px;text-shadow:0 2px 8px #000;margin-bottom:12px}
.gc-frame{position:relative;width:260px;height:140px;border:4px solid #fff;border-bottom:none;background:repeating-linear-gradient(90deg,#ffffff26 0 2px,transparent 2px 13px),repeating-linear-gradient(0deg,#ffffff26 0 2px,transparent 2px 13px)}
.gc-ball{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 32%,#fff,#cfcfcf);border:1px solid #222;left:46%;bottom:-34px}
.gc-ball.k0{animation:gk0 .85s ease-out forwards}@keyframes gk0{to{left:12%;bottom:58%}}
.gc-ball.k1{animation:gk1 .85s ease-out forwards}@keyframes gk1{to{left:82%;bottom:60%}}
.gc-ball.k2{animation:gk2 .7s ease-out forwards}@keyframes gk2{to{left:46%;bottom:52%}}
.gc-ball.k3{animation:gk3 .95s ease-in-out forwards}@keyframes gk3{50%{left:78%;bottom:82%}100%{left:18%;bottom:54%}}
/* ===== Campeón: copa + confeti ===== */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:70}
.trophy{cursor:pointer;transition:transform .55s cubic-bezier(.2,1.4,.4,1);transform-origin:50% 100%;display:inline-block}
.trophy.lift{transform:translateY(-20px) scale(1.08)}
.trophy-hint{font-size:11px;color:var(--muted);margin-top:2px;margin-bottom:6px}
/* ===== Portada con imagen ===== */
.portada{position:relative;width:100%;height:min(82vh,840px);border:2px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:6px 6px 0 var(--terra);margin-bottom:16px}
.pblur{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(30px) brightness(.6);transform:scale(1.18);display:none}
.pimg{position:absolute;inset:0;background-size:cover;background-position:top center;z-index:1}
.pfg{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:18px 16px 16px;background:linear-gradient(180deg,transparent,rgba(8,8,8,.55) 35%,rgba(8,8,8,.92))}
.pfg .introbtns{display:flex;flex-direction:column;gap:9px;margin-bottom:10px}
.pfg .byline{text-align:center;font-size:11px}
@media(min-width:760px){.pblur{display:block}.pimg{background-size:contain;background-repeat:no-repeat}}
/* intro: imagen con instrucciones adentro + botones lisos debajo */
.covertitle{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:clamp(38px,12vw,68px);line-height:.9;letter-spacing:-.01em;text-align:center;color:var(--ink);margin:6px 0 14px}
.covertitle span{color:var(--terra)}
.coverhero{position:relative;border:2px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:6px 6px 0 var(--terra);margin-bottom:18px}
.ihbg{position:absolute;inset:0;background-size:cover;background-position:top center;z-index:0}
.ihveil{position:relative;z-index:1;min-height:430px;display:flex;flex-direction:column;justify-content:flex-end;padding:20px 18px 22px;color:#f4efe6;background:linear-gradient(180deg,rgba(8,8,8,0),rgba(8,8,8,.12) 32%,rgba(8,8,8,.9) 72%)}
.ihveil .kicker{color:#f0a06e}
.ihveil h2{font-family:"Oswald";text-transform:uppercase;font-weight:700;font-size:clamp(26px,7.5vw,38px);line-height:.95;margin:2px 0 12px;color:#fff}
.ihsteps{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:7px;font-size:13.5px;line-height:1.34;color:#e9e2d6}
.ihsteps b{color:#fff}
.introbtns{max-width:380px;margin-left:auto;margin-right:auto}
/* ===== nombres de jugadores: sans-serif ===== */
.slot .nm, .mname{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
/* ===== puesto disponible: resaltado terracota ===== */
.slot.cand .dot{background:var(--terra); border-color:#fff; box-shadow:0 0 0 3px rgba(199,91,46,.35),0 0 16px 4px rgba(199,91,46,.75); animation:pulse 1s infinite; color:#fff}
.slot.cand .dot.pen{background:#9a4420}
/* ===== armado en 2 columnas (responsive) ===== */
.split{display:flex; flex-direction:column; gap:16px}
.split .col-pitch{order:-1}
.split.keep .col-pitch{order:0}
@media(min-width:820px){
  .split{flex-direction:row; align-items:flex-start; gap:22px}
  .split .col-ctrl{flex:1; min-width:0}
  .split .col-pitch{order:0; flex:0 0 360px; position:sticky; top:60px}
}
/* ===== leyenda de colores por posición ===== */
.poslegend{display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:0 0 10px; font-family:system-ui,sans-serif; font-size:12px}
.poslegend span{display:inline-flex; align-items:center; gap:5px; color:var(--ink); font-weight:600}
.poslegend i{width:13px;height:13px;border-radius:50%; border:1.5px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.2)}
/* ===== lista de jugadores (estilo nuevo) ===== */
.players.scrollbox{max-height:330px; overflow-y:auto; padding:2px 2px 4px}
.players .pcard{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:9px 12px; background:#fff; border:2px solid var(--ink); border-radius:12px; margin-bottom:7px; cursor:pointer; box-shadow:2px 2px 0 var(--ink); transition:transform .1s}
.players .pcard:active{transform:translate(1px,1px); box-shadow:1px 1px 0 var(--ink)}
.players .pcard.dis{opacity:.4; cursor:default; box-shadow:none}
.players .pcard.sel{outline:3px solid var(--terra); outline-offset:1px}
.players .pcard .pnum{font-family:system-ui,sans-serif; font-weight:600; color:#b9b2a6; font-size:13px; min-width:30px}
.players .pcard .pbody{flex:1; min-width:0}
.players .pcard .pn{font-family:system-ui,sans-serif; font-weight:800; font-size:14px; color:var(--ink); line-height:1.12; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.players .pcard .pos{font-family:system-ui,sans-serif; font-weight:500; font-size:11px; color:#9b9488; letter-spacing:.02em}
.players .pcard .rt{font-family:"Oswald"; font-weight:700; font-size:25px; color:var(--ink); margin-left:auto; line-height:1}
.players .pcard .rt.s{color:var(--terra)}
.players .pcard .rt.hid{color:#cbc4b8}
.scrollcue{text-align:center; font-family:system-ui,sans-serif; font-size:11px; font-weight:700; color:var(--terra); margin:2px 0 8px; animation:bobdown 1.15s infinite}
@keyframes bobdown{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
/* ===== pelota + dirección de ataque (partido) ===== */
.mslot{transition:transform .5s ease, left .5s ease, top .5s ease}
.ball{position:absolute; width:11px;height:11px;border-radius:50%; background:radial-gradient(circle at 35% 30%,#fff,#cfcfcf); border:1px solid #222; box-shadow:0 1px 3px rgba(0,0,0,.55); left:50%; top:50%; opacity:0; transform:translate(-50%,-50%); transition:left .5s ease, top .5s ease, opacity .25s; z-index:4; pointer-events:none}
.ball.on{opacity:1}
.atkdir{position:absolute; top:5px; font-family:system-ui,sans-serif; font-size:9px; font-weight:700; letter-spacing:.03em; color:rgba(255,255,255,.72); pointer-events:none; z-index:2; max-width:40%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis}
/* camiseta del rival dentro del círculo */
.mdot.kit{background:#fff;overflow:hidden;padding:0}
.mdot.kit svg{position:absolute;width:168%;height:168%;left:-34%;top:-30%}
.mdot .gkg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:9px;filter:drop-shadow(0 1px 1px #000);z-index:2}
/* skill activada: luz amarilla en el círculo */
.mslot.skillon{z-index:4}
.mslot.skillon .mdot{border-color:#ffe14d!important;box-shadow:0 0 0 3px rgba(255,225,77,.85),0 0 18px 7px rgba(255,225,77,.95)!important;animation:litpulse .5s infinite}
.mslot.skillon .mname{color:#ffe14d;font-weight:700}
.mslot.pass .mdot{box-shadow:0 0 0 2px rgba(255,255,255,.65),0 0 10px 3px rgba(255,255,255,.4);transform:scale(1.12)}
/* ritmo + gestionar */
.livectl2{margin-top:10px;border-left:5px solid var(--terra);padding-left:8px}
.spdrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spdlbl{font-family:"Space Mono";font-size:12px;color:var(--muted)}
.spdbtn{border:2px solid var(--ink);background:var(--cream);color:var(--ink);font-weight:800;font-size:13px;padding:5px 12px;border-radius:12px;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}
.spdbtn:active{transform:translate(2px,2px);box-shadow:none}
.spdbtn.act{background:var(--terra);color:#fff}
.spdhint{font-family:"Space Mono";font-size:10px;color:var(--terra);margin-left:2px}
.mgbtn{margin-top:10px;width:100%;background:#1E5BB8;color:#fff;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);font-weight:800;letter-spacing:.02em}
.mgbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.mgsec{margin:12px 0;text-align:left}
.mglbl{font-weight:800;font-size:13px;margin-bottom:6px}
body.night .spdbtn{background:#15151c;color:#eef4ff;border-color:#000;box-shadow:2px 2px 0 #000}
body.night .spdbtn.act{background:#C75B2E}
/* ===== fundido ===== */
.enlbl.fundido{color:#c0392b; font-weight:800}
/* ===== mini-stats final ===== */
.matchstats{display:flex; justify-content:center; gap:18px; margin:10px 0; font-family:system-ui,sans-serif; font-size:13px; flex-wrap:wrap}
.matchstats .st{text-align:center}
.matchstats .st b{display:block; font-family:"Oswald"; font-size:20px; color:var(--ink)}
.matchstats .st span{font-size:11px; color:var(--muted)}

.sitefoot{margin-top:22px; padding:14px 0 4px; text-align:center; border-top:1px solid rgba(26,26,26,.12)}

.sitefoot .apoya{display:inline-block; margin-top:9px; font-family:"Oswald"; font-weight:600; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:#fff; background:var(--terra); padding:7px 16px; border-radius:999px; text-decoration:none; box-shadow:2px 2px 0 var(--ink)}

.sndbtn{background:none; border:1.5px solid var(--ink); border-radius:8px; cursor:pointer; font-size:15px; padding:3px 8px; line-height:1; margin-left:8px}

.players.scrollbox{display:block; grid-template-columns:none; max-height:300px; overflow-y:auto; overflow-x:hidden; padding:2px 2px 4px}
.players.scrollbox .pcard{padding:6px 10px; gap:8px; margin-bottom:6px; border-radius:10px}

.players.scrollbox .pcard .rt{font-size:20px}
.dadobox{margin-bottom:10px}
.rollbox.sm{min-height:116px; box-shadow:5px 5px 0 var(--ink)}
.rollbox.sm .rollnm{font-size:clamp(20px,6vw,30px)}
.rollbox.sm .rollyr{font-size:12px}
.rollbox.sm .rolltag{display:none}
.rollbox.sm .rollhint{font-size:44px}
.pitch{max-width:340px}
.split .col-pitch .pitch{max-width:380px}
@media(min-width:820px){ .split.draftsplit .col-pitch{flex:0 0 400px} }

.play.goal{background:linear-gradient(90deg,#2e9e4f,#1f7d3c); color:#fff; border:2px solid #18632f; border-left:6px solid #ffd24d; box-shadow:5px 5px 0 var(--ink); transform:scale(1.015)}
.play.goal .who{color:#fff; font-size:15px}
.play.goal .who .yr{color:#ffe9b0}
.play.goal .txt{color:#fff; font-size:16px; font-weight:600; margin-top:4px}
.play.goal .txt b{color:#ffd24d; font-size:19px; letter-spacing:.04em}
/* ===== header del equipo (arriba, compacto) ===== */
.teamhead{display:flex; align-items:center; gap:11px; width:100%; text-align:left; padding:4px 4px}
.teamhead .thinfo{flex:1; min-width:0}
.teamhead .thnm{font-family:"Oswald"; text-transform:uppercase; font-weight:700; font-size:22px; line-height:1; color:var(--ink)}
.teamhead .thyr{display:inline; font-size:11px; color:var(--terra); text-transform:none; font-weight:400; letter-spacing:0}
.teamhead .thpf{font-family:"Spectral"; font-style:italic; font-size:12.5px; color:var(--muted); margin-top:4px; line-height:1.25}
.teamhead .thrat{align-self:flex-start}
/* ===== cajas del draft mas bajas ===== */
.rollbox.sm{min-height:68px; padding:8px 12px; margin-bottom:16px}
.dadobox{margin-bottom:8px}
.wilds{margin-bottom:10px}
.wild{padding:7px 10px}
.wild .we{font-size:18px}
.wild .wn{font-size:12px; margin-top:1px}
.wild .wd{font-size:10px; margin-top:1px; line-height:1.2}
</style>

function clubKey(c){c=(c||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
if(c.includes('river'))return'river';if(c.includes('boca'))return'boca';if(c.includes('independiente'))return'independiente';
if(c.includes('estudiantes'))return'estudiantes';if(c.includes('velez'))return'velez';if(c.includes('racing'))return'racing';
if(c.includes('huracan'))return'huracan';if(c.includes('newell'))return'newells';if(c.includes('sanlorenzo'))return'sanlorenzo';
if(c.includes('lanus'))return'lanus';if(c.includes('central'))return'central';if(c.includes('platense'))return'platense';
if(c.includes('godoy'))return'godoycruz';if(c.includes('tigre'))return'tigre';if(c.includes('banfield'))return'banfield';
if(c.includes('talleres'))return'talleres';if(c.includes('belgrano'))return'belgrano';if(c.includes('argentinos'))return'argentinos';

function esc(s){return (s+"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));}
function squadAvgVal(){return S.squad.reduce((a,p)=>a+(p.eff!=null?p.eff:p.rt),0)/11;}
function computeScore(){
  const rw=S.cup.filter(x=>x&&x.win).length;
  const gd=S.cup.reduce((a,x)=>a+(x?(x.gf-x.ga):0),0);
  const champ=rw>=4, avg=squadAvgVal();
  let base=rw*120 + (champ?280:0) + gd*10 + Math.max(0,86-avg)*9;
  return Math.max(0, Math.round(base*(S.showRatings?1.0:1.5)));
}
async function lbTop(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/scores?select=name,score,team,formation&order=score.desc&limit=5`,{headers:LB_H});
  if(!r.ok)throw 0; return await r.json();
}
async function lbSave(name,score){
  const team=S.slots.map(s=>({pos:s.label,name:s.player.name,club:s.player.fromClub,yr:s.player.fromYr,rt:s.player.rt}));
  const r=await fetch(`${SUPABASE_URL}/rest/v1/scores`,{method:"POST",headers:{...LB_H,Prefer:"return=minimal"},
    body:JSON.stringify({name:name,score:score,team:team,formation:S.formation.name})});
  if(!r.ok)throw 0;
}
function lbRender(rows,hl){
  const medal=["🥇","🥈","🥉"];
  let html=rows.map((row,i)=>`<details class="lbrow ${hl&&row.name===hl?'me':''}">
    <summary><span class="lbpos">${medal[i]||(i+1)}</span><span class="lbname">${esc(row.name)}</span><span class="lbpts mono">${row.score}</span></summary>
    <div class="lbteam">${(row.team||[]).map(p=>`<div><span class="mono lbtp">${esc(p.pos)}</span> ${esc(p.name)} <span style="color:var(--muted)">${esc(p.club||'')} ${p.yr||''}</span></div>`).join("")}<div class="mono" style="margin-top:4px;color:var(--terra)">${esc(row.formation||"")}</div></div>
  </details>`).join("");
  const el=document.getElementById("lblist"); if(el) el.innerHTML=html||'<div class="lbmsg">Todavía no hay records. ¡Sé el primero!</div>';
}
function lbForm(score){

function slotsFor(f){

}
function pSide(p){return p.pos==="EI"?"I": p.pos==="ED"?"D": null;}
// compatibilidad por grupo; además un volante de banda puede ir de extremo de SU lado (MI→EI, MD→ED)
function compat(slot,p){
  const sr=slot.rol, pr=p.rol;
  if(sr==="ARQ"||sr==="LI"||sr==="LD"||sr==="DFC"||sr==="DC")return pr===sr;
  if(sr==="MED")return pr==="MED";
  if(sr==="EXT")return pr==="EXT" || (slot.side==="I"&&p.pos==="MI") || (slot.side==="D"&&p.pos==="MD");
  return false;
}
// penalización: -2 fuera de puesto exacto (medios) o de banda (extremos puros); -1 si un volante de banda juega de extremo de su lado
function penOf(slot,p){
  if(slot.rol==="MED")return slot.label!==p.pos?2:0;
  if(slot.rol==="EXT"){
    if(p.rol==="EXT")return slot.side!==pSide(p)?2:0;
    return 1; // MI→EI o MD→ED (mismo lado)
  }
  return 0;
}

  const cols=['#C75B2E','#2e9e4f','#1E5BB8','#ffd23f','#ffffff'];
  let P=[]; for(let i=0;i<130;i++)P.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.6,r:4+Math.random()*5,c:pick(cols),vy:2+Math.random()*3,vx:-1.2+Math.random()*2.4,rot:Math.random()*6,vr:-0.2+Math.random()*0.4});
  const t0=Date.now(); cancelAnimationFrame(_conf);
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);ctx.restore();});

}

// peso: cuanto MÁS alto el rating, MENOS probable. Los equipazos (90+) salen bastante menos.
function teamWeight(t){return Math.pow(Math.max(2,100-t.rating),1.35);}
function weightedTeam(list){
  if(!list||!list.length)return null;
  let ws=list.map(teamWeight), tot=ws.reduce((a,b)=>a+b,0), r=Math.random()*tot;
  for(let i=0;i<list.length;i++){r-=ws[i];if(r<=0)return list[i];}
  return list[list.length-1];
}
// 50% sale un equipo de la mitad "buena" (rating alto), 50% de la mitad "mala"
function pickBalanced(list){
  if(!list||!list.length)return null;
  if(list.length===1)return list[0];
  const sorted=list.slice().sort((a,b)=>a.rating-b.rating);
  const mid=Math.floor(sorted.length/2);
  const low=sorted.slice(0,mid), high=sorted.slice(mid);
  const pool=(Math.random()<0.5?high:low);
  return pick(pool.length?pool:list);
}

function pitchHTML(candPlayer){
  let lines=`<div class="ln" style="left:8%;right:8%;top:50%;height:2px"></div>
    <div class="ln" style="left:50%;top:50%;width:54px;height:54px;border:2px solid rgba(255,255,255,.5);border-radius:50%;transform:translate(-50%,-50%);background:transparent"></div>`;
  let s=S.slots.map((sl,i)=>{

    let cls, inner, extra='';
    if(sl.player){
      const pen=sl.player.pen>0;
      cls='filled';
      const col=lineColor(sl.player.line);
      extra=`;--glow:${col}`;
      const txt=S.showRatings?(sl.player.eff+(pen?`<sup>▾${sl.player.pen}</sup>`:'')):sl.label;
      inner=`<div class="dot" style="background:${col}">${txt}</div><div class="nm">${esc(sl.player.name.split(' ').slice(-1)[0])}</div>`;
    } else if(cand){

function assign(slotIdx){

// recalcula fuerzas del partido según plan actual vs rival (incluye mano a mano táctico)
function recomputeMatchup(){
  if(!MATCH)return 0;
  const riv=MATCH.riv, rplan=normPlan(riv.plan);
  const raggr={contra:36,posesion:54,bandas:62}[rplan];
  const me=strength(S.squad,S.plan,S.liveAggr,DTS[S.dt].style,true);
  const rv=strength(riv.players,rplan,raggr,rplan,false);
  const hcap=(0.3+S.round*0.25)+(S.daily?3.2:0);
  let meAtk=me.atk, meDfn=me.dfn, rvAtk=rv.atk+hcap, rvDfn=rv.dfn+hcap, read=0;
  if(beats(S.plan,rplan)){meAtk+=4.5;rvAtk-=2.7;read=1;}
  else if(beats(rplan,S.plan)){rvAtk+=4.5;meAtk-=2.7;read=-1;}
  MATCH.me={atk:meAtk,dfn:meDfn}; MATCH.rv={atk:rvAtk,dfn:rvDfn}; MATCH.read=read;
  return read;
}

// ---------- MATCH ENGINE ----------
function lineAvg(squad,line,useSkill){const a=squad.filter(p=>p.line===line);return a.length?a.reduce((s,p)=>s+(useSkill?skillEff(p):(p.eff!=null?p.eff:p.rt)),0)/a.length:70;}
function strength(squad,plan,aggr,dtStyle,useSkill){
  const gk=lineAvg(squad,"GK",useSkill),def=lineAvg(squad,"DEF",useSkill),mid=lineAvg(squad,"MID",useSkill),att=lineAvg(squad,"ATT",useSkill);
  let atk=mid*0.42+att*0.58, dfn=gk*0.28+def*0.52+mid*0.20;
  // actitud 0-100 (50 = equilibrado): ofensivo sube ataque y baja defensa
  const a=(aggr-50)/50;
  atk+=a*8; dfn-=a*7;
  // plan
  if(plan==="bandas")atk+=1.5;
  else if(plan==="contra"){dfn+=2;atk-=0.5;}
  else if(plan==="posesion"){atk+=0.8;dfn+=0.8;}
  // DT afín (frontal cuenta como bandas)
  if(dtStyle && normPlan(dtStyle)===plan){atk+=2;dfn+=2;}
  return {atk,dfn,mid};
}
function simulate(){
  const riv=S.rivals[S.round];
  const rplan=normPlan(riv.plan);
  const raggr={contra:36,posesion:54,bandas:62}[rplan];
  const me=strength(S.squad,S.plan,S.aggr,DTS[S.dt].style,true);
  const rv=strength(riv.players,rplan,raggr,rplan,false); // el rival juega afín a su plan
  // dificultad: el rival rinde por encima de su papel y sube por ronda
  const hcap = (0.3 + S.round*0.25) + (S.daily?3.2:0); // rival del día: más duro
  let meAtk=me.atk, meDfn=me.dfn, rvAtk=rv.atk+hcap, rvDfn=rv.dfn+hcap, read=0;
  if(beats(S.plan,rplan)){meAtk+=4.5;rvAtk-=2.7;read=1;}
  else if(beats(rplan,S.plan)){rvAtk+=4.5;meAtk-=2.7;read=-1;}
  let xgMe=Math.min(4.2,Math.max(.15,1.0+(meAtk-rvDfn)*0.05));
  let xgRv=Math.min(4.2,Math.max(.15,0.95+(rvAtk-meDfn)*0.05));
  let gf=poisson(xgMe), ga=poisson(xgRv);
  return {riv,gf,ga,xgMe,xgRv,read,me:{atk:meAtk,dfn:meDfn},rv:{atk:rvAtk,dfn:rvDfn},rplan};
}
let MATCH=null, feedTimer=null;
function playMatch(){
  MATCH=simulate();
  S.energy=100; S.liveAggr=S.aggr; S._lastMin=0;
  S.subsLeft=3; S._lineupDirty=false; S.bench.forEach(b=>{if(b)b._used=false;});
  S._hasMotor=S.squad.some(p=>p.skill==='Motor');
  MATCH.redMin=null; MATCH.rvRedMin=null;
  S._plays = buildPlays(MATCH);
  const cards=buildCards();
  S._plays = S._plays.concat(cards).sort((a,b)=>a.min-b.min);
  S._pi=0; MATCH.curF=0; MATCH.curA=0;
  vMatch();
}
function buildCards(){
  let cards=[];
  function roll(players,side,team){players.forEach(p=>{ if(p.skill==='Agresivo'){
    if(Math.random()<0.35) cards.push({card:'yellow',who:p,side,team,type:'card',min:Math.floor(rnd(20,86))});
    if(Math.random()<0.08) cards.push({card:'red',who:p,side,team,type:'card',min:Math.floor(rnd(28,88))});
  }});}

  const phase = lit ? 'attack' : ((MATCH&&MATCH._phase)||'build');
  const t=Date.now()/1000;
  const cfgMe=sideCfg('me'), cfgRv=sideCfg('rv');
  const nodes=els.map((el,i)=>{
    const bx=+el.dataset.bx, by=+el.dataset.by, side=el.dataset.side, line=el.dataset.line;
    const cfg=side==='me'?cfgMe:cfgRv, dir=cfg.dir, inPoss=side===poss;
    const flank=by>50?1:-1, wide=Math.abs(by-50)>8;
    // presión / actitud: sube o baja TODO el bloque
    let ax=((cfg.aggr-50)/50)*7*dir;
    if(cfg.plan==='contra')   ax-=2.5*dir;
    if(cfg.plan==='posesion') ax+=1.5*dir;
    // ancho del estilo
    let ay=0;
    if(cfg.plan==='bandas' && wide) ay+=flank*7;
    else if(cfg.plan==='posesion') ay-=flank*3.5;

// barrido ascendente (riser/whoosh)
function swoosh(t0,dur,o2){o2=o2||{};
  const c=actx(),a=c.currentTime+t0,len=Math.floor(c.sampleRate*(dur+0.1)),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=c.createBufferSource();src.buffer=buf;
  const bp=c.createBiquadFilter();bp.type='bandpass';bp.Q.value=1.1;
  bp.frequency.setValueAtTime(o2.f0||450,a); bp.frequency.exponentialRampToValueAtTime(o2.f1||3200,a+dur);
  const g=c.createGain();src.connect(bp);bp.connect(g);g.connect(_master); if(_rev)g.connect(_rev);
  g.gain.setValueAtTime(0.0001,a);
  g.gain.exponentialRampToValueAtTime(o2.vol||0.07,a+dur*0.7);
  g.gain.exponentialRampToValueAtTime(0.0001,a+dur);
  src.start(a);src.stop(a+dur+0.05);
}

function whistle(){ // silbato suave, no estridente
  if(S&&S.sound===false)return;
  try{
    const c=actx();
    [[0,0.06,0.13],[0.16,0.05,0.1]].forEach(([off,vol,len])=>{
      const o=c.createOscillator(),g=c.createGain(),lp=c.createBiquadFilter(),lfo=c.createOscillator(),lg=c.createGain();
      lp.type='lowpass'; lp.frequency.value=2600;

      lfo.frequency.value=13; lg.gain.value=9; lfo.connect(lg); lg.connect(o.frequency); lfo.start(a); lfo.stop(a+len+0.04);
      o.connect(g); g.connect(lp); lp.connect(_master);
      g.gain.setValueAtTime(0.0001,a);
      g.gain.exponentialRampToValueAtTime(vol,a+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,a+len);

}
function chanceProb(e){
  const m=MATCH, ef=energyFactor();
  let base;
  if(e.side==="me"){
    const diff = m.me.atk*ef*(1+(S.liveAggr-50)/220) - m.rv.dfn;
    base=0.18+diff*0.012;
  } else {
    const open=1+(S.liveAggr-50)/220;
    const diff = m.rv.atk - (m.me.dfn*ef)/open;
    base=0.18+diff*0.012;
  }
  if(e.type==='1v1') base+=0.16;
  if(e.side==='me' && e.who){
    if(e.who.skill==='Matador') base+=0.08;
    if(e.who.skill==='Pelota Parada' && e.type==='penal') base+=0.06;
  }
  if(MATCH.redMin!=null && e.min>=MATCH.redMin && e.side==='me') base*=0.92;
  if(MATCH.rvRedMin!=null && e.min>=MATCH.rvRedMin && e.side==='me') base*=1.06;
  return Math.max(0.05,Math.min(0.9,base));
}

function runPens(m, cb){
  const box=document.getElementById('matchend');

    <div class="pentitle">TANDA DE PENALES</div>
    <div class="penteams"><span>${S.teamName}</span><span class="penscore"><b id="penF">0</b> - <b id="penA">0</b></span><span>${m.riv.club}</span></div>

  </div>`;
  box.scrollIntoView({behavior:'smooth',block:'center'});
  const kMe=penKickers(S.squad), kRv=penKickers(m.riv.players);
  let sF=0,sA=0,kf=0,ka=0;
  function over(){
    let remMe=Math.max(0,5-kf), remRv=Math.max(0,5-ka);
    if(kf<5||ka<5){ if(sF>sA+remRv) return true; if(sA>sF+remMe) return true; return false; }
    return kf===ka && sF!==sA;
  }

      big.innerHTML=`<div class="pteam">${side==='me'?S.teamName:m.riv.club}</div><div class="pkick">${kicker.name}</div>`;
    } else {

    }
  }
  function ask(side,kicker){
    show(side,kicker,'ask');

    const q=mine?'¿Dónde la pateás?':'Sos el arquero: ¿a dónde te tirás?';
    const btns=PALOS.map(p=>`<button class="palo" onclick="window._penPick('${p.k}')"><div class="paloe">${p.e}</div><div>${p.n}</div></button>`).join("");
    document.getElementById('penpick').innerHTML=`<div class="qq" style="margin:8px 0 4px">${q}</div><div class="palos">${btns}</div>`;
    window._penPick=function(dir){
      document.getElementById('penpick').innerHTML='';
      const cpu=pick(PALOS).k;
      let scored;
      if(mine){ const beat=dir!==cpu; let p=beat?0.9:0.32; if(kicker.skill==='Pelota Parada')p=Math.min(0.97,p+0.06); scored=Math.random()<p; }
      else { const saved=dir===cpu; const gkPen=((S.squad.find(x=>x.line==='GK')||{}).skill==='Penales'); scored= saved ? (Math.random()<(gkPen?0.10:0.25)) : (Math.random()<0.92); }
      const res = scored?'¡GOOOL!' : (mine?(Math.random()<.5?'¡ATAJADO!':'AFUERA'):'¡ATAJADO!');
      show(side,kicker,scored?'goal':'miss',res);
      goalJuice(scored && mine);
      if(side==='me'){addDot('rowF',scored); if(scored)sF++; kf++; document.getElementById('penF').textContent=sF;}

function go(scr){S.screen=scr;render();window.scrollTo({top:0,behavior:'smooth'});}
function goBack(){
  if(S.runOver){
    if(confirm('Si volvés se pierde esta corrida y no vas a poder anotarte de nuevo en el ranking. ¿Seguro?')){ reset(); go('intro'); }
    return;
  }
  const t=BACK[S.screen]; if(t)go(t);
}
function updateBack(){const b=document.getElementById('backbtn'); if(b) b.style.visibility=(S.screen==='intro')?'hidden':'visible';}
function render(){
  ({intro:vIntro,formation:vFormation,draft:vDraft,setup:vSetup,cup:vCup,prematch:vPrematch,match:vMatch,champion:vChampion,ranking:vRanking}[S.screen]||vIntro)();
  updateBack();
  document.body.classList.toggle('night', S.mode==='daily' && !['intro','ranking'].includes(S.screen));
}
render();
</script>
<script>
/* ===== INTRO OVERLAY CONTROL ===== */
(function(){
  var ov=document.getElementById('introOverlay');
  if(!ov) return;
  var vid=document.getElementById('introVideo');
  var btn=document.getElementById('introPlay');
  var skip=document.getElementById('introSkip');
  var done=false;

  function showPlay(){ btn.classList.add('show'); }
  function dismiss(){
    if(done) return; done=true;
    ov.classList.add('gone');
    try{ vid.pause(); }catch(e){}
    setTimeout(function(){ if(ov && ov.parentNode) ov.parentNode.removeChild(ov); }, 600);
  }

  // Intentar autoplay (muted permite reproducir solo en móvil/desktop)
  var p = vid.play();
  if(p && p.catch){ p.catch(function(){ /* si el navegador bloquea, mostramos PLAY igual */ showPlay(); }); }

  // Cuando termina el video -> aparece el botón PLAY sobre el negro
  vid.addEventListener('ended', showPlay);
  // Fallback: si por algún motivo no dispara 'ended', mostrar botón a los 6s
  setTimeout(showPlay, 6000);

  btn.addEventListener('click', dismiss);
  skip.addEventListener('click', dismiss);
})();
</script>
</body>
</html>
